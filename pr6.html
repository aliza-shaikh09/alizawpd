<html>
<head>
    <title>Border in HTML</title>
    <style>
        body {border: 5px solid black;
            padding: 27px;}

        p { padding: 20px;
            margin: 12px }

        .p1 {border: 3px solid red; }
        .p2 {border: 3px dashed blue; }
        .p3 {border: 3px dotted green;}
        .p4 {border: 4px double purple;}
    </style>
</head>

<body>
    <h2>WPD PRACTICAL</h2>
    <p class="p1">PRACTICAL NO.6.</p>
    <p class="p2">ALIZA SHAIKH.</p>
    <p class="p3">ROLL NO-11.</p>
    <p class="p4">MET BKC IOT.</p>

</body>
</html>
